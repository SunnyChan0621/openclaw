name: Build OpenClaw Android APK

on:
  push:
    branches: [main]
    paths:
      - 'apps/android/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('apps/android/**/*.gradle*', 'apps/android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x apps/android/gradlew

      - name: Build Play Debug APK
        working-directory: apps/android
        run: ./gradlew :app:assemblePlayDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-android-play-debug
          path: apps/android/app/build/outputs/apk/**/*.apk

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-${{ github.sha }}
          name: Android Build ${{ github.sha }}
          body: |
            Automated Android APK build from commit ${{ github.sha }}
          files: apps/android/app/build/outputs/apk/**/*.apk
          draft: false
          prerelease: true
